services:
  web:
    build: .
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "change-me-in-prod"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

